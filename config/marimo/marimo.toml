[server]
browser = "default"
follow_symlink = false

[completion]
activate_on_typing = true
copilot = "github"
signature_hint_on_typing = false

[language_servers.basedpyright]
enabled = false

[language_servers.pylsp]
enable_ruff = true
enabled = false
enable_pylint = false
enable_mypy = true
enable_flake8 = false
enable_pyflakes = false
enable_pydocstyle = false

[keymap]
preset = "default"

[keymap.overrides]

[formatting]
line_length = 88

[runtime]
default_sql_output = "auto"
auto_reload = "off"
watcher_on_save = "lazy"
auto_instantiate = false
reactive_tests = true
output_max_bytes = 8000000
std_stream_max_bytes = 1000000
on_cell_change = "autorun"

[package_management]
manager = "pip"

[save]
format_on_save = true
autosave_delay = 1000
autosave = "after_delay"

[ai]
inline_tooltip = true

[ai.models]
custom_models = []
displayed_models = []

[snippets]
include_default_snippets = true
custom_paths = []

[display]
default_table_page_size = 10
theme = "light"
default_width = "full"
dataframes = "rich"
default_table_max_columns = 50
reference_highlighting = true
code_editor_font_size = 14
cell_output = "below"

[diagnostics]
sql_linter = true
enabled = true

[mcp]
presets = []

[mcp.mcpServers]
