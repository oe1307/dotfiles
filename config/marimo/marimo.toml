[ai]
inline_tooltip = true

[ai.models]
displayed_models = []
custom_models = []

[language_servers.pylsp]
enable_mypy = true
enable_flake8 = false
enable_pylint = false
enable_ruff = true
enabled = true
enable_pydocstyle = false
enable_pyflakes = false

[language_servers.basedpyright]
enabled = true

[keymap]
preset = "default"

[keymap.overrides]

[completion]
activate_on_typing = true
signature_hint_on_typing = false
copilot = "github"

[snippets]
include_default_snippets = true
custom_paths = []

[mcp]
presets = []

[mcp.mcpServers]

[display]
theme = "light"
cell_output = "below"
dataframes = "rich"
default_width = "medium"
default_table_max_columns = 50
code_editor_font_size = 14
reference_highlighting = true
default_table_page_size = 10

[save]
autosave = "after_delay"
format_on_save = true
autosave_delay = 1000

[runtime]
std_stream_max_bytes = 1000000
watcher_on_save = "lazy"
auto_reload = "off"
output_max_bytes = 8000000
reactive_tests = true
on_cell_change = "autorun"
auto_instantiate = false
default_sql_output = "auto"

[formatting]
line_length = 88

[diagnostics]
sql_linter = true
enabled = true

[package_management]
manager = "pip"

[server]
follow_symlink = false
browser = "default"
