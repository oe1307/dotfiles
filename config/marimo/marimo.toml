[completion]
signature_hint_on_typing = false
copilot = "github"
activate_on_typing = true

[snippets]
custom_paths = []
include_default_snippets = true

[formatting]
line_length = 88

[package_management]
manager = "pip"

[display]
default_width = "full"
theme = "light"
cell_output = "below"
default_table_page_size = 10
reference_highlighting = true
code_editor_font_size = 14
dataframes = "rich"
default_table_max_columns = 50

[keymap]
preset = "default"

[keymap.overrides]

[runtime]
output_max_bytes = 8000000
default_sql_output = "auto"
watcher_on_save = "lazy"
on_cell_change = "autorun"
std_stream_max_bytes = 1000000
auto_reload = "off"
auto_instantiate = false
reactive_tests = true

[language_servers.pylsp]
enable_pylint = false
enable_flake8 = false
enable_mypy = true
enable_pyflakes = false
enabled = true
enable_pydocstyle = false
enable_ruff = true

[language_servers.basedpyright]
enabled = true

[mcp]
presets = []

[mcp.mcpServers]

[server]
browser = "default"
follow_symlink = false

[ai]
inline_tooltip = true

[ai.models]
displayed_models = []
custom_models = []

[save]
autosave_delay = 1000
autosave = "after_delay"
format_on_save = true

[diagnostics]
enabled = true
sql_linter = true
